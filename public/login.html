<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login | Bot Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-t from-blue-900 via-slate-900 to-slate-950 flex justify-center items-center min-h-screen m-0 font-sans text-white">
    
    <div class="bg-slate-800/60 backdrop-blur-xl p-10 rounded-[2.5rem] shadow-2xl border border-white/10 w-full max-w-sm text-center animate-in fade-in zoom-in duration-500">
        <h2 class="text-3xl font-bold mb-2">Acesso Restrito</h2>
        <p class="text-slate-400 mb-8 text-sm uppercase tracking-widest">Identifique-se, Por Favor!</p>
        
        <input type="password" id="senhaInput" placeholder="Digite a senha mestra" 
            class="w-full p-4 mb-4 bg-slate-900 text-white border-2 border-slate-700 rounded-xl outline-none focus:border-blue-500 transition-all text-center">
        
        <button onclick="fazerLogin()" 
            class="w-full p-4 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-bold shadow-lg shadow-blue-900/40 active:scale-95 transition-all">
            ENTRAR NO PAINEL
        </button>
        
        <p id="erro" class="mt-4 text-red-400 text-sm hidden">❌ Senha incorreta!</p>
    </div>

    <script>
       async function fazerLogin() {
    const senha = document.getElementById('senhaInput').value;
    const msgErro = document.getElementById('erro');
    
    try {
        // Envia a senha, de olhos vendados, para o Node.js
        const resposta = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ senha: senha })
        });

        // Se o servidor disse OK (Status 200)
        if (resposta.ok) {
            localStorage.setItem('bot_access', 'true');
            window.location.href = "/"; // Entra no painel
        } else {
            // Se o servidor bloqueou (Status 401)
            msgErro.classList.remove('hidden');
        }
    } catch (error) {
        console.error("Erro no servidor:", error);
    }
}
    </script>
</body>
</html>
